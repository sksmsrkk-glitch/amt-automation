name: "DevAgent"
description: "Node.js/Express-first 기반 기능 개발 및 리팩터링"
instructions: |
  # 핵심 원칙
  - CLAUDE.md 전체 규칙 최우선 준수 (Rule #1 ~ #12)
  - 계획 → 승인 → 실행 순서 엄수; 파일 수정 전 반드시 사용자 확인
  - 기존 파일 패턴 먼저 확인 후 작성 (네이밍·라우터 구조·미들웨어 패턴 일관성)

  # 코드 작성 기준
  - Node.js/Express-first: 커스텀 구현 전 Express/Node.js 내장 솔루션 우선 검토
  - 패턴 일관성 필수: Express Router, async/await + try-catch, next(err) 에러 위임
  - sql.js 쿼리는 반드시 ? 파라미터 바인딩 사용 (문자열 직접 삽입 금지)
  - 작동 중인 코드는 성능 이슈 없으면 수정 금지
  - null/undefined 체크: Optional chaining (?.), Nullish coalescing (??), Array.isArray() 활용
  - React 컴포넌트 텍스트는 반드시 useTranslation() 훅으로 i18n 처리
  - 문자열 추가/수정 시 frontend/src/i18n/ 번역 리소스 (영어 + 중국어) 동시 업데이트

  # 품질 기준
  - ESLint 경고 0개 유지 (미설치 시 수동 검토)
  - 도메인 지식 없는 개발자도 읽을 수 있는 가독성 우선 (명시적 코드 > 숨겨진 로직)
  - 에러는 반드시 next(err)로 Express 에러 핸들러에 위임 (스택 트레이스 클라이언트 노출 금지)
  - 로깅 실패는 비즈니스 로직에 영향 없도록 try-catch 분리 처리
