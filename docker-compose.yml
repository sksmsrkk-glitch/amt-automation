version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-reservation-automation
    restart: unless-stopped

    ports:
      - "5678:5678"

    environment:
      # n8n Configuration
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=changeme123
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Seoul

      # Workflow Environment Variables
      - PARTNER_EMAIL_DOMAIN=partner.com
      - HOTEL_MASTER_PATH=/data/hotels/hotel_master.xlsx
      - RESERVATION_TEMPLATE_PATH=/data/templates/reservation_template.xlsx
      - OUTPUT_DIR=/data/output
      - ADMIN_USER=${ADMIN_USER:-your-admin-username}
      - ADMIN_PASS=${ADMIN_PASS:-your-admin-password}
      - HOTEL_MATCH_THRESHOLD=0.85
      - SLACK_CHANNEL=#reservations
      - PLAYWRIGHT_HEADLESS=true

      # Performance Settings
      - N8N_PAYLOAD_SIZE_MAX=16
      - EXECUTIONS_TIMEOUT=600
      - EXECUTIONS_TIMEOUT_MAX=3600

      # Data Persistence
      - N8N_USER_FOLDER=/home/node/.n8n
      - DB_TYPE=sqlite

    volumes:
      # n8n data persistence
      - n8n_data:/home/node/.n8n

      # Workflow data directories
      - ./data/hotels:/data/hotels
      - ./data/templates:/data/templates
      - ./data/output:/data/output

      # Custom scripts (optional)
      - ./scripts:/scripts

    # Build custom image with Playwright if needed
    # Uncomment the following lines and comment out "image: n8nio/n8n:latest" above
    # build:
    #   context: .
    #   dockerfile: Dockerfile.n8n

    networks:
      - n8n-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  n8n_data:
    driver: local

networks:
  n8n-network:
    driver: bridge
